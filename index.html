<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026학년도 해강중학교 학사일정</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#d1d5db;
      --accent:#2563eb;

      --cellBg:#ffffff;
      --cellAlt:#fafafa;
      --pillBg:#eef2ff;

      --today:#BDC0C0;
      --shadow: 0 10px 30px rgba(15,23,42,.08);

      --fs-title:18px;
      --fs-ui:12px;
      --fs-dow:12px;
      --fs-day:12px;
      --fs-item:12px;

      --pad-wrap:10px;
      --pad-card:10px;

      --cell-minh:112px;
      --cell-pad:10px;

      --bar-top:30px;
      --bar-h:20px;
      --bar-gap:4px;
      --bar-row-h:24px;
    }
    @media (max-width: 520px){
      :root{
        --fs-title:16px;
        --fs-ui:11px;
        --fs-dow:11px;
        --fs-day:11px;
        --fs-item:11px;

        --pad-wrap:8px;
        --pad-card:8px;

        --cell-minh:90px;
        --cell-pad:8px;

        --bar-top:28px;
        --bar-h:18px;
        --bar-gap:3px;
        --bar-row-h:21px;
      }
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header{
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }

    .wrap{max-width: 1600px; margin:0 auto; padding: var(--pad-wrap);}
    .top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    h1{margin:0; font-size: var(--fs-title); letter-spacing:-.3px; line-height:1.1;}
    .notice{margin:4px 0 0 0; color: var(--muted); font-size: 11px;}

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      border:1px solid var(--line);
      background: transparent;
      color: var(--text);
      padding:7px 10px;
      border-radius:10px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      user-select:none;
      font-size: var(--fs-ui);
      white-space:nowrap;
    }
    .btn:active{transform: translateY(1px)}
    .btn.primary{
      border-color: color-mix(in oklab, var(--accent) 55%, var(--line));
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 12%, transparent) inset;
    }

    select, .input{
      border:1px solid var(--line);
      background: transparent;
      color: var(--text);
      padding:7px 10px;
      border-radius:10px;
      outline:none;
      font-size: var(--fs-ui);
      max-width: 320px;
    }
    .input::placeholder{color: var(--muted)}
    option{color:#111827}

    main{padding-bottom: 22px;}

    .monthCard{
      background: var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin: 10px 0;
    }

    .monthbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      background: #fff;
    }
    .monthbar .m{
      font-weight:900;
      letter-spacing:-.3px;
      font-size: var(--fs-ui);
    }

    .calendar{padding: var(--pad-card);}

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      border:1px solid var(--line);
      border-bottom:0;
      border-radius:12px 12px 0 0;
      overflow:hidden;
    }
    .dow div{
      padding:6px 6px;
      font-size: var(--fs-dow);
      color: var(--muted);
      border-right:1px solid var(--line);
      background: var(--cellAlt);
    }
    .dow div:last-child{border-right:0}

    .weeks{
      border:1px solid var(--line);
      border-top:0;
      border-radius:0 0 12px 12px;
      overflow:hidden;
    }

    .week{
      position: relative;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      border-top:1px solid var(--line);
      background: var(--cellBg);
      --bar-rows: 0;
    }
    .week:first-child{border-top:0}

    .bars{
      position:absolute;
      left:0; right:0;
      top: var(--bar-top);
      padding: 0 var(--cell-pad);
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: var(--bar-h);
      row-gap: var(--bar-gap);
      pointer-events:none;
      z-index: 3;
    }
    .bar{
      height: var(--bar-h);
      border-radius:999px;
      border:1px solid color-mix(in oklab, var(--line) 70%, transparent);
      background: color-mix(in oklab, var(--pillBg) 70%, transparent);
      display:flex;
      align-items:center;
      gap:6px;
      padding:0 8px;
      overflow:hidden;
      white-space:nowrap;
      pointer-events:auto;
      min-width:0;
      margin: 0 1px;
      line-height:1;
    }
    .bar .dot{width:8px; height:8px; border-radius:50%; background: var(--accent); flex:0 0 auto;}
    .bar .txt{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size: var(--fs-item); font-weight:800;}

    .cell{
      position:relative;
      min-height: var(--cell-minh);
      padding: var(--cell-pad);
      padding-top: calc(var(--cell-pad) + 18px + (var(--bar-rows) * var(--bar-row-h)));
      border-right:1px solid var(--line);
      background: var(--cellBg);
      overflow:hidden;
      z-index: 1;
    }
    .cell:nth-child(odd){background: var(--cellAlt)}
    .cell:last-child{border-right:0}
    .cell.muted{opacity:.45}

    .cell.today{
      background: var(--today) !important;
      box-shadow: inset 0 0 0 2px rgba(17,24,39,.18);
    }

    .cellTop{
      position:absolute;
      top: 4px;
      left: var(--cell-pad);
      right: var(--cell-pad);
      display:flex;
      justify-content:space-between;
      align-items:center;
      color: var(--muted);
      font-size: var(--fs-day);
      pointer-events:none;
      z-index: 2;
    }
    .cellTop .dayNum{font-weight:900; color:#111827;}
    .cell.muted .cellTop .dayNum{color:#6b7280;}

    .cellList{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
      z-index: 1;
      position: relative;
    }

    .item{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
      padding:4px 6px;
      border-radius:10px;
      border:1px solid color-mix(in oklab, var(--line) 70%, transparent);
      background: color-mix(in oklab, var(--pillBg) 55%, transparent);
      font-size: var(--fs-item);
      overflow:hidden;
      white-space:nowrap;
      line-height:1.1;
    }
    .item .dot{width:7px; height:7px; border-radius:50%; background: var(--accent); flex:0 0 auto;}
    .item .t{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700;}

    /* =========================
       ✅ POPUP LIST MODAL
       ========================= */
    .modalOverlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 200;
    }
    .modalOverlay.open{ display:flex; }

    .modal{
      width: min(920px, 96vw);
      max-height: min(78vh, 820px);
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      display:flex;
      flex-direction: column;
    }
    .modalHeader{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    .modalHeader .title{
      font-weight: 900;
      font-size: 13px;
      letter-spacing: -.2px;
    }
    .modalBody{
      padding: 10px 14px 14px 14px;
      overflow: auto;
    }
    .modalHint{
      color: var(--muted);
      font-size: 11px;
      margin: 0 0 10px 0;
    }
    .resultList{
      display:flex;
      flex-direction: column;
      gap: 8px;
    }
    .resultRow{
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: #fafafa;
      display:flex;
      gap: 10px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .resultRow .left{min-width:0}
    .resultRow .date{
      font-weight: 900;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .resultRow .name{
      font-size: 12px;
      font-weight: 700;
      word-break: break-word;
    }
    .resultRow .tag{
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      padding-left: 8px;
    }
    .linkBtn{
      border:1px solid var(--line);
      background:#fff;
      color: var(--text);
      padding: 6px 9px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
    }

    @media print{
      header{display:none !important}
      .monthCard{box-shadow:none}
      .modalOverlay{display:none !important}
      body{background:#fff}
    }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>2026학년도 학사일정</h1>
        <div class="notice">이 웹사이트는 데스크톱에서 최적화되어 있습니다
          (마지막 업데이트 : 2026-03-06).</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="controls">
        <button class="btn" id="prevBtn">◀︎ 이전 달</button>
        <button class="btn" id="todayBtn">◎ <span id="todayLabel">오늘</span></button>
        <button class="btn" id="nextBtn">다음 달 ▶︎</button>
        <select id="monthSelect" title="월 선택"></select>
      </div>

      <!-- ✅ 우측 상단: 리스트 버튼 + 검색창 -->
      <div class="controls">
        <button class="btn" id="openListBtn" title="리스트 보기">☰ 리스트</button>
        <input id="globalSearch" class="input" placeholder="2026 전체 검색" />
      </div>

      <div class="controls">
        <button class="btn primary" id="printBtn">🖨 인쇄</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap" id="monthsRoot"></div>
</main>

<!-- ✅ 리스트 팝업 -->
<div class="modalOverlay" id="modalOverlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-label="일정 리스트">
    <div class="modalHeader">
      <div class="title" id="modalTitle">일정 리스트</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="linkBtn" id="modalScrollTop">맨 위</button>
        <button class="btn" id="modalCloseBtn">닫기 ✕</button>
      </div>
    </div>
    <div class="modalBody">
      <p class="modalHint" id="modalHint">전체 일정이 날짜 순으로 표시됩니다.</p>
      <div class="resultList" id="modalList"></div>
    </div>
  </div>
</div>

<script>
/* =========================
   EVENTS
   - 단일일: { date:"YYYY-MM-DD", title:"..." }
   - 기간일정: { start:"YYYY-MM-DD", end:"YYYY-MM-DD", title:"..." }
   ========================= */
const EVENTS = [
  { date:"2026-03-01", title:"삼일절" },
  { date:"2026-03-02", title:"삼일절 대체공휴일" },
  { date:"2026-03-03", title:"개학식(1교시)" },
  { date:"2026-03-03", title:"입학식(3교시)" },
  { date:"2026-05-05", title:"어린이날" },
  { date:"2026-05-06", title:"개교기념일" },
  { date:"2026-05-24", title:"부처님 오신날" },
  { date:"2026-05-25", title:"부처님 오신날 대체공휴일" },
  { date:"2026-06-03", title:"제 9회 전국동시지방선거" },
  { date:"2026-06-06", title:"현충일" },
  { date:"2026-07-17", title:"제헌절" },
  { date:"2026-08-15", title:"광복절" },
  { date:"2026-08-17", title:"광복절 대체공휴일" },
  { date:"2026-10-03", title:"개천절" },
  { date:"2026-10-05", title:"개천절 대체공휴일" },
  { date:"2026-10-09", title:"한글날" },
  { date:"2026-12-25", title:"크리스마스" },

  { start:"2026-04-20", end:"2026-04-22", title:"중간고사(2,3학년)" },
  { start:"2026-06-23", end:"2026-06-25", title:"기말고사(2,3학년)" },
  { start:"2026-07-21", end:"2026-08-17", title:"여름방학" },
  { start:"2026-09-24", end:"2026-09-25", title:"추석연휴" },
  { start:"2026-10-27", end:"2026-10-28", title:"중간고사(1,2) / 기말(3)" },
  { start:"2026-12-07", end:"2026-12-09", title:"기말고사(1,2)" },
  { start:"2026-12-31", end:"2027-01-27", title:"겨울방학" },
  { start:"2027-02-15", end:"2027-02-19", title:"새학년 준비" },
];

const RANGE_START = "2026-03-01";
const RANGE_END   = "2027-02-28";

const DOW = ["일","월","화","수","목","금","토"];
const monthsRoot = document.getElementById("monthsRoot");

function pad2(n){ return String(n).padStart(2,"0"); }
function toISODate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function parseISO(iso){ const [y,m,d]=iso.split("-").map(Number); return new Date(y, m-1, d); }
function ymKey(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function formatYM(d){ return `${d.getFullYear()}.${pad2(d.getMonth()+1)}`; }
function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g, (m)=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  })[m]);
}
function normalized(s){ return (s||"").toLowerCase().trim(); }
function addDays(dateObj, n){ const d=new Date(dateObj); d.setDate(d.getDate()+n); return d; }
function weekStartOf(dateObj){
  const d = new Date(dateObj);
  const dow = d.getDay();
  d.setDate(d.getDate() - dow);
  d.setHours(0,0,0,0);
  return d;
}
function clampToRange(d){
  const min = parseISO(RANGE_START);
  const max = parseISO(RANGE_END);
  if(d < min) return min;
  if(d > max) return max;
  return d;
}
function isRangeEvent(e){ return !!(e.start && e.end); }
function rangeOverlapsMonth(e, monthDate){
  const ms = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
  const me = new Date(monthDate.getFullYear(), monthDate.getMonth()+1, 0);
  const a = parseISO(e.start).getTime();
  const b = parseISO(e.end).getTime();
  return a <= me.getTime() && b >= ms.getTime();
}
function splitRangeToWeekSegment(e, weekStartDate){
  const ws = new Date(weekStartDate); ws.setHours(0,0,0,0);
  const we = addDays(ws, 6);
  const a = parseISO(e.start);
  const b = parseISO(e.end);
  const segStart = (a > ws) ? a : ws;
  const segEnd   = (b < we) ? b : we;
  if(segStart > segEnd) return null;
  return { colStart: segStart.getDay(), colEnd: segEnd.getDay(), e };
}
function layoutBarsForWeek(rangeEvents, weekStartDate){
  const segs = [];
  for(const e of rangeEvents){
    const seg = splitRangeToWeekSegment(e, weekStartDate);
    if(seg) segs.push(seg);
  }
  segs.sort((x,y)=>{
    if(x.colStart !== y.colStart) return x.colStart - y.colStart;
    return (y.colEnd - y.colStart) - (x.colEnd - x.colStart);
  });

  const rowsEnd = [];
  const placed = [];
  for(const s of segs){
    let rowIndex = -1;
    for(let r=0;r<rowsEnd.length;r++){
      if(s.colStart > rowsEnd[r]){ rowIndex = r; break; }
    }
    if(rowIndex === -1){
      rowsEnd.push(-1);
      rowIndex = rowsEnd.length-1;
    }
    rowsEnd[rowIndex] = s.colEnd;
    placed.push({ rowIndex, seg:s });
  }
  return { rowsCount: rowsEnd.length, placed };
}

let state = {
  q: "",
  activeMonth: ymKey(clampToRange(new Date())),
};
const VISIT_TODAY_ISO = toISODate(new Date());

function buildMonthKeys(){
  const start = parseISO(RANGE_START);
  const end = parseISO(RANGE_END);
  const d = new Date(start.getFullYear(), start.getMonth(), 1);
  const out = [];
  while(d <= end){
    out.push(ymKey(d));
    d.setMonth(d.getMonth()+1);
  }
  return out;
}
const MONTH_KEYS = buildMonthKeys();

/* month select */
const monthSelect = document.getElementById("monthSelect");
monthSelect.innerHTML = MONTH_KEYS.map(k=>{
  const [y,m]=k.split("-");
  return `<option value="${k}">${y}.${m}</option>`;
}).join("");

/* ✅ 필터: 달력 표시는 "globalSearch"로만(2026 전체 검색) */
function getFilteredEventsByGlobalSearch(){
  const q = normalized(document.getElementById("globalSearch").value);
  if(!q) return EVENTS.slice();
  return EVENTS.filter(e=>{
    const hay = isRangeEvent(e)
      ? `${e.start} ${e.end} ${e.title}`.toLowerCase()
      : `${e.date} ${e.title}`.toLowerCase();
    return hay.includes(q);
  });
}

function renderAllMonths(){
  const filtered = getFilteredEventsByGlobalSearch();

  monthsRoot.innerHTML = MONTH_KEYS.map(k=>{
    const [y,m] = k.split("-").map(Number);
    const monthDate = new Date(y, m-1, 1);

    return `
      <section class="monthCard" id="m-${k}">
        <div class="monthbar">
          <div class="m">${escapeHtml(formatYM(monthDate))}</div>
          <div style="color:var(--muted); font-size:11px;">스크롤로 다음 달 계속</div>
        </div>
        <div class="calendar">
          <div class="dow">${DOW.map(d=>`<div>${d}</div>`).join("")}</div>
          <div class="weeks" data-month="${k}"></div>
        </div>
      </section>
    `;
  }).join("");

  document.querySelectorAll('.weeks[data-month]').forEach(weeksEl=>{
    const k = weeksEl.getAttribute("data-month");
    const [y,m] = k.split("-").map(Number);
    const cur = new Date(y, m-1, 1);
    const gridStart = weekStartOf(cur);

    const monthRanges = filtered.filter(e=> isRangeEvent(e) && rangeOverlapsMonth(e, cur));
    const monthSingles = filtered.filter(e=> !isRangeEvent(e) && (e.date||"").startsWith(k));

    const weeksHtml = [];
    for(let w=0; w<6; w++){
      const ws = addDays(gridStart, w*7);
      const { rowsCount, placed } = layoutBarsForWeek(monthRanges, ws);

      const barsHtml = `
        <div class="bars" style="grid-template-rows: repeat(${rowsCount}, var(--bar-h));">
          ${placed.map(p=>{
            const gcStart = p.seg.colStart + 1;
            const gcEnd = p.seg.colEnd + 2;
            const gr = p.rowIndex + 1;
            return `
              <div class="bar" style="grid-column:${gcStart}/${gcEnd}; grid-row:${gr};" title="${escapeHtml(p.seg.e.title)}">
                <span class="dot"></span>
                <span class="txt">${escapeHtml(p.seg.e.title)}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;

      let cellsHtml = "";
      for(let c=0;c<7;c++){
        const d = addDays(ws, c);
        const iso = toISODate(d);
        const inMonth = d.getMonth() === cur.getMonth();

        const singles = monthSingles.filter(e=> e.date === iso);

        const showMax = 3;
        const show = singles.slice(0, showMax);
        const remain = singles.length - show.length;

        const items =
          show.map(ev=>`
            <div class="item" title="${escapeHtml(ev.title)}">
              <span class="dot"></span>
              <span class="t">${escapeHtml(ev.title)}</span>
            </div>
          `).join("") +
          (remain>0 ? `
            <div class="item" title="${escapeHtml(singles.slice(showMax).map(x=>x.title).join(" / "))}">
              <span class="dot"></span>
              <span class="t">+${remain}개 더</span>
            </div>
          ` : "");

        const isToday = (iso === VISIT_TODAY_ISO);

        cellsHtml += `
          <div class="cell ${inMonth ? "" : "muted"} ${isToday ? "today" : ""}">
            <div class="cellTop"><span class="dayNum">${d.getDate()}</span><span></span></div>
            <div class="cellList">${items}</div>
          </div>
        `;
      }

      weeksHtml.push(`<div class="week" style="--bar-rows:${rowsCount};">${barsHtml}${cellsHtml}</div>`);
    }

    weeksEl.innerHTML = weeksHtml.join("");
  });
}

/* scroll */
function scrollToMonth(k){
  const el = document.getElementById(`m-${k}`);
  if(!el) return;
  el.scrollIntoView({ behavior:"smooth", block:"start" });
  state.activeMonth = k;
  monthSelect.value = k;
}
function getPrevMonth(k){
  const idx = MONTH_KEYS.indexOf(k);
  return MONTH_KEYS[Math.max(0, idx-1)];
}
function getNextMonth(k){
  const idx = MONTH_KEYS.indexOf(k);
  return MONTH_KEYS[Math.min(MONTH_KEYS.length-1, idx+1)];
}

/* =========================
   ✅ LIST POPUP + GLOBAL SEARCH RESULTS
   ========================= */
const modalOverlay = document.getElementById("modalOverlay");
const modalList = document.getElementById("modalList");
const modalTitle = document.getElementById("modalTitle");
const modalHint = document.getElementById("modalHint");

function expandToDailyList(events){
  // 기간일정은 날짜별로 펼쳐서 리스트에 넣지 않고, "기간"으로 1건 표시
  const out = [];
  for(const e of events){
    if(isRangeEvent(e)){
      out.push({ type:"range", key:`${e.start}~${e.end}|${e.title}`, date:e.start, title:e.title, range:`${e.start} ~ ${e.end}` });
    }else{
      out.push({ type:"single", key:`${e.date}|${e.title}`, date:e.date, title:e.title, range:null });
    }
  }
  // sort by date then title
  out.sort((a,b)=>{
    if(a.date !== b.date) return a.date.localeCompare(b.date);
    return a.title.localeCompare(b.title, "ko");
  });
  return out;
}

function openModalWithList(items, titleText, hintText){
  modalTitle.textContent = titleText;
  modalHint.textContent = hintText;

  if(items.length === 0){
    modalList.innerHTML = `<div style="color:var(--muted); font-size:12px; padding:8px 2px;">검색 결과가 없습니다.</div>`;
  }else{
    modalList.innerHTML = items.map(it=>{
      const label = it.type==="range" ? it.range : it.date;
      // 점프 버튼: 해당 월로 이동
      const k = it.date.slice(0,7);
      return `
        <div class="resultRow">
          <div class="left">
            <div class="date">${escapeHtml(label)}</div>
            <div class="name">${escapeHtml(it.title)}</div>
          </div>
          <div class="tag">
            <button class="linkBtn" data-jump="${escapeHtml(k)}">이동</button>
          </div>
        </div>
      `;
    }).join("");

    modalList.querySelectorAll("[data-jump]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const k = btn.getAttribute("data-jump");
        closeModal();
        scrollToMonth(k);
      });
    });
  }

  modalOverlay.classList.add("open");
  modalOverlay.setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  modalOverlay.classList.remove("open");
  modalOverlay.setAttribute("aria-hidden","true");
  document.body.style.overflow = "";
}

document.getElementById("openListBtn").addEventListener("click", ()=>{
  const filtered = getFilteredEventsByGlobalSearch();
  const items = expandToDailyList(filtered);
  openModalWithList(items, "일정 리스트", "전체 일정이 날짜 순으로 표시됩니다.");
});

document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
modalOverlay.addEventListener("click", (e)=>{
  if(e.target === modalOverlay) closeModal();
});
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape") closeModal();
});

document.getElementById("modalScrollTop").addEventListener("click", ()=>{
  document.querySelector(".modalBody").scrollTo({top:0, behavior:"smooth"});
});

/* ✅ 검색창: 입력 시 “2026 전체 검색 결과”를 리스트로(팝업 자동 오픈) */
let searchDebounce = null;
document.getElementById("globalSearch").addEventListener("input", ()=>{
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(()=>{
    renderAllMonths(); // 달력도 동시에 필터된 내용 반영
    const q = normalized(document.getElementById("globalSearch").value);
    if(!q){
      // 검색 지우면 팝업은 그대로 두지 않음
      closeModal();
      return;
    }
    const filtered = getFilteredEventsByGlobalSearch();
    const items = expandToDailyList(filtered);
    openModalWithList(items, `검색 결과: "${q}"`, "2026~2027 학년도 범위 전체에서 검색한 결과입니다.");
  }, 150);
});

/* header controls */
document.getElementById("prevBtn").addEventListener("click", ()=>{
  scrollToMonth(getPrevMonth(state.activeMonth));
});
document.getElementById("nextBtn").addEventListener("click", ()=>{
  scrollToMonth(getNextMonth(state.activeMonth));
});
document.getElementById("todayBtn").addEventListener("click", ()=>{
  const t = clampToRange(new Date());
  const k = ymKey(new Date(t.getFullYear(), t.getMonth(), 1));
  scrollToMonth(k);
});
document.getElementById("printBtn").addEventListener("click", ()=>window.print());

monthSelect.addEventListener("change", (e)=>scrollToMonth(e.target.value));

/* Intersection observer to track current month while scrolling */
const io = new IntersectionObserver((entries)=>{
  const visible = entries
    .filter(e=>e.isIntersecting)
    .sort((a,b)=>b.intersectionRatio - a.intersectionRatio)[0];
  if(!visible) return;
  const id = visible.target.id; // m-YYYY-MM
  const k = id.replace("m-","");
  state.activeMonth = k;
  monthSelect.value = k;
}, { root:null, threshold:[0.35, 0.5, 0.65] });

function observeMonths(){
  document.querySelectorAll('.monthCard').forEach(el=>io.observe(el));
}

/* init */
document.getElementById("todayLabel").textContent = VISIT_TODAY_ISO;

renderAllMonths();
observeMonths();
scrollToMonth(state.activeMonth);
</script>
