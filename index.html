<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026학년도 학사일정</title>
  <style>
    :root{
      --bg:#ffffff; --text:#111827; --muted:#6b7280; --line:#d1d5db;
      --accent:#2563eb;
      --cellBg:#ffffff; --cellAlt:#fafafa; --pill:#eef2ff;
      --shadow: 0 10px 30px rgba(15,23,42,.08);
      --today:#BDC0C0;

      --fs-h1:18px; --fs-ui:12px; --fs-dow:12px; --fs-day:11px; --fs-pill:11px;
      --pad-wrap:8px; --pad-card:8px;
      --cell-minh:110px; --cell-pad:10px;
    }

    @media (max-width: 600px){
      :root{
        --fs-h1:16px; --fs-ui:11px; --fs-dow:10px; --fs-day:10px; --fs-pill:10px;
        --pad-wrap:6px; --pad-card:6px;
        --cell-minh:70px; --cell-pad:6px;
      }
    }

    /* PC에서 좌우 여백 최소 + 달력 넓게 */
    @media (min-width: 900px){
      .wrap{ max-width: 1700px; }
      :root{ --cell-minh:120px; --fs-pill:12px; --fs-day:12px; }
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header{ background: var(--bg); border-bottom:1px solid var(--line); }
    .wrap{ max-width:1200px; margin:0 auto; padding: var(--pad-wrap); }
    h1{ margin:0; font-size: var(--fs-h1); letter-spacing:-.3px; }

    .toolbar{
      display:flex; justify-content:space-between; align-items:center;
      gap:8px; flex-wrap:wrap; margin-top:8px;
    }
    .controls{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    .btn{
      border:1px solid var(--line);
      background: transparent;
      color:var(--text);
      padding:7px 9px;
      border-radius:10px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      user-select:none;
      font-size: var(--fs-ui);
      white-space:nowrap;
    }
    .btn:active{ transform: translateY(1px) }
    .btn.primary{
      border-color: color-mix(in oklab, var(--accent) 55%, var(--line));
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 12%, transparent) inset;
    }

    select, .input{
      border:1px solid var(--line);
      background: transparent;
      color:var(--text);
      padding:7px 9px;
      border-radius:10px;
      outline:none;
      font-size: var(--fs-ui);
      max-width: 320px;
    }
    .input::placeholder{ color: var(--muted) }
    option{ color:#111827 }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow: var(--shadow);
    }

    .monthbar{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      padding:10px 12px; border-bottom:1px solid var(--line); flex-wrap:wrap;
    }
    .monthbar .m{ font-weight:900; letter-spacing:-.3px; font-size: var(--fs-ui); }

    .calendar{ padding: var(--pad-card); }

    .dow{
      display:grid; grid-template-columns: repeat(7, 1fr);
      border:1px solid var(--line); border-bottom:0;
      border-radius:12px 12px 0 0; overflow:hidden;
    }
    .dow div{
      padding:6px 6px;
      font-size: var(--fs-dow);
      color:var(--muted);
      border-right:1px solid var(--line);
      background: var(--cellAlt);
      text-align:left;
    }
    .dow div:last-child{ border-right:0 }

    .weeks{
      border:1px solid var(--line); border-top:0;
      border-radius:0 0 12px 12px; overflow:hidden;
    }

    .week{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      border-top:1px solid var(--line);
      background: var(--cellBg);
    }
    .week:first-child{ border-top:0 }

    .cell{
      position:relative;
      min-height: var(--cell-minh);
      padding: var(--cell-pad);
      padding-top: calc(var(--cell-pad) + 18px);
      border-right:1px solid var(--line);
      background: var(--cellBg);
      overflow:hidden;
    }
    .cell:nth-child(odd){ background: var(--cellAlt) }
    .cell:last-child{ border-right:0 }
    .cell.muted{ opacity:.45 }

    .cell.today{
      background: var(--today) !important;
      box-shadow: inset 0 0 0 2px rgba(17,24,39,.20);
    }

    .cellTop{
      position:absolute;
      top: 4px;
      left: var(--cell-pad);
      right: var(--cell-pad);
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size: var(--fs-day);
      color:var(--muted);
      pointer-events:none;
    }
    .cellTop .dayNum{ font-weight:900; color:#111827; }
    .cell.muted .cellTop .dayNum{ color:#6b7280; }

    .cellList{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .pill{
      display:flex; align-items:center; gap:6px; min-width:0;
      padding:4px 6px;
      border-radius:10px;
      border:1px solid color-mix(in oklab, var(--line) 70%, transparent);
      background: color-mix(in oklab, var(--pill) 65%, transparent);
      font-size: var(--fs-pill);
      overflow:hidden; white-space:nowrap;
      line-height: 1.1;
    }
    .pill .dot{ width:7px; height:7px; border-radius:50%; background: var(--accent); flex:0 0 auto; }
    .pill .t{ min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700; }

    @media print{
      header{ display:none !important }
      .card{ box-shadow:none }
      body{ background:#fff }
    }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>2026학년도 학사일정</h1>
    <div class="toolbar">
      <div class="controls">
        <button class="btn" id="prevBtn" title="이전 달 (←)">◀︎ 이전</button>
        <button class="btn" id="todayBtn" title="오늘로 이동">◎ <span id="todayLabel">오늘</span></button>
        <button class="btn" id="nextBtn" title="다음 달 (→)">다음 ▶︎</button>

        <select id="monthSelect" title="월 선택"></select>
        <input id="q" class="input" placeholder="검색: 예) 4.20 | 중간고사" />
      </div>
      <div class="controls">
        <button class="btn primary" id="printBtn" title="인쇄/저장">🖨 인쇄</button>
      </div>
    </div>
  </div>
</header>

<main>

    <section class="card">

      <div class="calendar">

  { date:"2027-01-28", title:"개학식" },

  { date:"2027-02-17", title:"새학년 준비" },
  { date:"2027-02-18", title:"새학년 준비" },
  { date:"2027-02-19", title:"새학년 준비" },
];

/* 표시 범위: 2026.03 ~ 2027.02 (학년도) */
const START_MONTH = "2026-03-01";
const END_MONTH   = "2027-02-28";

const DOW = ["일","월","화","수","목","금","토"];

function pad2(n){ return String(n).padStart(2,"0"); }
function toISODate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function ymKey(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function formatYM(d){ return `${d.getFullYear()}.${pad2(d.getMonth()+1)}`; }
function formatMD(iso){ const [_,m,d]=iso.split("-").map(Number); return `${m}.${d}`; }
function normalized(s){ return (s||"").toLowerCase().trim(); }
function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g, (m)=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  })[m]);
}
function clampDateToRange(d){
  const min = new Date(START_MONTH);
  const max = new Date(END_MONTH);
  if(d < min) return min;
  if(d > max) return max;
  return d;
}
function addDays(dateObj, n){ const d=new Date(dateObj); d.setDate(d.getDate()+n); return d; }
function weekStartOf(dateObj){
  const d=new Date(dateObj);
  const dow=d.getDay();
  d.setDate(d.getDate()-dow);
  d.setHours(0,0,0,0);
  return d;
}

let state = {
  cursor: new Date(START_MONTH),
  q: "",
  month: ymKey(new Date(START_MONTH)),
};

const els = {
  monthTitle: document.getElementById("monthTitle"),
  dow: document.getElementById("dow"),
  weeks: document.getElementById("weeks"),
  monthSelect: document.getElementById("monthSelect"),
  q: document.getElementById("q"),
  todayLabel: document.getElementById("todayLabel"),
};

/* 접속한 날짜 1칸만 색칠 */
const VISIT_TODAY_ISO = toISODate(new Date());

function buildMonthOptions(){
  const start = new Date(START_MONTH);
  const end = new Date(END_MONTH);
  const opts = [{value:"ALL", label:"전체"}];
  const d = new Date(start); d.setDate(1);
  while(d <= end){
    opts.push({ value: ymKey(d), label: formatYM(d) });
    d.setMonth(d.getMonth()+1);
  }
  els.monthSelect.innerHTML = opts.map(o=>`<option value="${o.value}">${o.label}</option>`).join("");
}

function getFilteredEvents(){
  const q = normalized(state.q);
  return EVENTS.slice()
    .sort((a,b)=> (a.date+a.title).localeCompare(b.date+b.title))
    .filter(e => {
      if(!q) return true;
      const md = formatMD(e.date);
      const hay = [e.date, md, e.title].join(" ").toLowerCase();
      return hay.includes(q);
    });
}

function eventsOnDate(iso){
  const all = getFilteredEvents();
  if(state.month !== "ALL" && !iso.startsWith(state.month)) return [];
  return all.filter(e=> e.date === iso);
}

function renderDOW(){
  els.dow.innerHTML = DOW.map(x=>`<div>${x}</div>`).join("");
}

function renderCalendar(){
  let cur;
  if(state.month === "ALL"){
    cur = new Date(state.cursor); cur.setDate(1);
  } else {
    const [y,m] = state.month.split("-").map(Number);
    cur = new Date(y, m-1, 1);
    state.cursor = cur;
  }

  els.monthTitle.textContent = (state.month === "ALL")
    ? `${formatYM(cur)} (전체)`
    : formatYM(cur);

  els.monthSelect.value = state.month;

  const gridStart = weekStartOf(new Date(cur));

  const weeksHtml = [];
  for(let w=0; w<6; w++){
    const ws = addDays(gridStart, w*7);

    let cellsHtml = ``;
    for(let c=0;c<7;c++){
      const d = addDays(ws, c);
      const iso = toISODate(d);
      const inMonth = d.getMonth() === cur.getMonth();
      const evs = eventsOnDate(iso);

      /* 한 칸에 너무 많아지면 3개까지만 표시하고 나머지는 +N */
      const maxShow = (window.matchMedia("(max-width: 600px)").matches ? 2 : 3);
      const show = evs.slice(0, maxShow);
      const remain = evs.length - show.length;

      const pillItems = show.map(ev => `
        <div class="pill" title="${escapeHtml(ev.title)}">
          <span class="dot"></span>
          <span class="t">${escapeHtml(ev.title)}</span>
        </div>
      `).join("") + (remain > 0 ? `
        <div class="pill" title="${escapeHtml(evs.slice(maxShow).map(x=>x.title).join(" / "))}">
          <span class="dot"></span>
          <span class="t">+${remain}개 더</span>
        </div>
      ` : "");

      const isVisitToday = (iso === VISIT_TODAY_ISO);

      cellsHtml += `
        <div class="cell ${inMonth ? "" : "muted"} ${isVisitToday ? "today" : ""}">
          <div class="cellTop"><span class="dayNum">${d.getDate()}</span><span></span></div>
          <div class="cellList">${pillItems}</div>
        </div>
      `;
    }

    weeksHtml.push(`<div class="week">${cellsHtml}</div>`);
  }

  els.weeks.innerHTML = weeksHtml.join("");
}

function render(){ renderCalendar(); }

function moveMonth(delta){
  const d = new Date(state.cursor);
  d.setMonth(d.getMonth()+delta);
  d.setDate(1);
  state.cursor = clampDateToRange(d);
  if(state.month !== "ALL"){
    state.month = ymKey(state.cursor);
    els.monthSelect.value = state.month;
  }
  render();
}

/* init */
renderDOW();
buildMonthOptions();
els.todayLabel.textContent = VISIT_TODAY_ISO;

state.cursor = clampDateToRange(new Date());
state.month = ymKey(state.cursor);
els.monthSelect.value = state.month;

/* bind */
document.getElementById("prevBtn").addEventListener("click", ()=>moveMonth(-1));
document.getElementById("nextBtn").addEventListener("click", ()=>moveMonth(+1));
document.getElementById("todayBtn").addEventListener("click", ()=>{
  state.cursor = clampDateToRange(new Date());
  if(state.month !== "ALL") state.month = ymKey(state.cursor);
  render();
});
els.monthSelect.addEventListener("change", (e)=>{
  state.month = e.target.value;
  if(state.month !== "ALL"){
    const [y,m] = state.month.split("-").map(Number);
    state.cursor = clampDateToRange(new Date(y, m-1, 1));
  }
  render();
});
els.q.addEventListener("input", (e)=>{ state.q = e.target.value; render(); });
document.getElementById("printBtn").addEventListener("click", ()=>window.print());
window.addEventListener("keydown", (e)=>{
  if(e.key==="ArrowLeft") moveMonth(-1);
  if(e.key==="ArrowRight") moveMonth(+1);
});

render();
</script>
</body>
</html>
